name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg, shellcheck, and tesseract
        run: sudo apt-get update -y && sudo apt-get install -y ffmpeg shellcheck tesseract-ocr

      - name: Run test suite
        run: bash tests/run-tests.sh
